element:
- style: tabpanel
  id: hurrywave_hmt
  position:
    x: 10
    y: 1
    width: -10
    height: -10
  variable_group: hurrywave_hmt
  tab:
  - string: Domain
    module: delftdashboard.models.hurrywave_hmt.domain
    method: set_model_variables
    element: domain.yml
  - string: Time Frame
    module: delftdashboard.models.hurrywave_hmt.timeframe
    element: timeframe.yml
  - string: Physics
    element: physics.yml
  - string: Numerics
    module: delftdashboard.models.hurrywave_hmt.numerics
    element: numerics.yml
  - string: Boundary Conditions
    module: delftdashboard.models.hurrywave_hmt.boundary_conditions
    element: boundary_conditions.yml
  - string: Meteo
    module: delftdashboard.models.hurrywave_hmt.meteo
    element: meteo.yml
  - string: Observation Points
    element: observation_points.yml
  - string: Output
    module: delftdashboard.models.hurrywave_hmt.output
    element: output.yml

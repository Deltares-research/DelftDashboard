  tooltip: Edit X-coordinate of the grid origin
- style: edit
  position:
    x: 160
    y: 110
    width: 60
    height: 20
  text: Y0
  variable: y0
  method: edit_origin
  tooltip: Edit Y-coordinate of the grid origin
- style: edit
  position:
    x: 60
    y: 85
    width: 60
    height: 20
  text: MMax
  variable: mmax
  method: edit_nmmax
  tooltip: Edit number of grid cells in M-direction
- style: edit
  position:
    x: 160
    y: 85
    width: 60
    height: 20
  text: NMax
  variable: nmax
  method: edit_nmmax
  tooltip: Edit number of grid cells in N-direction
- style: edit
  position:
    x: 60
    y: 60
    width: 60
    height: 20
  text: dX
  variable: dx
  method: edit_dxdy
  tooltip: Edit grid cell size in X-direction
- style: edit
  position:
    x: 160
    y: 60
    width: 60
    height: 20
  text: dY
  variable: dy
  method: edit_dxdy
  tooltip: Edit grid cell size in Y-direction
- style: edit
  position:
    x: 60
    y: 35
    width: 60
    height: 20
  text: Rotation
  variable: rotation
  method: edit_rotation
  tooltip: Edit grid rotation angle in degrees
- style: pushbutton
  text: Draw Model Domain
  position:
    x: 230
    y: 110
    width: 120
    height: 20
  method: draw_grid_outline
  tooltip: Draw a bounding box on the map to define the grid extent
- style: pushbutton
  text: Generate Grid
  position:
    x: 230
    y: 85
    width: 120
    height: 20
  method: generate_grid
  tooltip: Generate the computational grid
- style: checkbox
  position:
    x: 400
    y: 110
    width: 120
    height: 20
  text: SnapWave
  variable: use_snapwave
  method: use_snapwave
  tooltip: Enable SnapWave spectral wave model
- style: checkbox
  id: sbg
  position:
    x: 400
    y: 85
    width: 20
    height: 20
  text: Sub-Grid Bathymetry
  variable: use_subgrid
  method: use_subgrid
  tooltip: Enable sub-grid bathymetry for higher resolution depth representation
- style: checkbox
  position:
    x: 400
    y: 50
    width: 20
    height: 20
  text: Show Mask Polygons
  variable: show_mask_polygons_in_domain_tab
  method: show_mask_polygons
  tooltip: Show or hide mask polygons on the map
- style: pushbutton
  text: Read Set-up File
  position:
    x: 600
    y: 110
    width: 120
    height: 20
  method: read_setup_yaml
  tooltip: Read model set-up from a YAML file
- style: pushbutton
  text: Write Set-up File
  position:
    x: 600
    y: 85
    width: 120
    height: 20
  method: write_setup_yaml
  tooltip: Write model set-up to a YAML file
- style: pushbutton
  text: Build Model
  position:
    x: 600
    y: 60
    width: 120
    height: 20
  method: build_model
  tooltip: Build the complete model from the current set-up

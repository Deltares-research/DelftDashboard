- style: pushbutton
  text: Update Mask
  position:
    x: 670
    y: 110
    width: 100
    height: 20
  method: update_mask
  tooltip: Update the active cell mask based on current settings
- style: pushbutton
  text: Cut Inactive Cells
  position:
    x: 670
    y: 85
    width: 100
    height: 20
  method: cut_inactive_cells
  tooltip: Remove inactive cells from the grid


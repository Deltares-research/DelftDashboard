element:
- style: panel
  title: Global
  position:
    x: 10
    y: 10
    width: 90
    height: 120
  element:
  - style: edit
    position:
      x: 35
      y: 90
      width: 45
      height: 20
    text: Zmax
    variable: global_zmax
    tooltip: Maximum elevation for active cells
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: use_mask_global
        operator: eq
        value: true
  - style: edit
    position:
      x: 35
      y: 65
      width: 45
      height: 20
    text: Zmin
    variable: global_zmin
    tooltip: Minimum elevation for active cells
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: use_mask_global
        operator: eq
        value: true
  - style: checkbox
    position:
      x: 10
      y: 40
      width: 20
      height: 20
    text: Use Global
    variable: use_mask_global
    tooltip: Apply global elevation-based masking
- style: panel
  title: Include Polygons
  position:
    x: 110
    y: 10
    width: 270
    height: 120
  element:
  - style: listbox
    position:
      x: 10
      y: 10
      width: 80
      height: 100
    method: select_include_polygon
    variable: include_polygon_index
    select: index
    option_string:
      variable: include_polygon_names
    tooltip: Select include polygon from list
  - style: pushbutton
    text: Draw Polygon
    position:
      x: 100
      y: 90
      width: 80
      height: 20
    method: draw_include_polygon
    tooltip: Draw an include polygon on the map
  - style: pushbutton
    text: Delete Polygon
    position:
      x: 100
      y: 65
      width: 80
      height: 20
    method: delete_include_polygon
    tooltip: Delete selected include polygon
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: nr_include_polygons
        operator: gt
        value: 0
  - style: pushbutton
    text: Load Polygon
    position:
      x: 100
      y: 40
      width: 80
      height: 20
    method: load_include_polygon
    tooltip: Load include polygon from file
  - style: pushbutton
    text: Save Polygon
    position:
      x: 100
      y: 15
      width: 80
      height: 20
    method: save_include_polygon
    tooltip: Save include polygon to file
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: nr_include_polygons
        operator: gt
        value: 0
  - style: edit
    position:
      x: 215
      y: 90
      width: 45
      height: 20
    text: Zmax
    variable: include_zmax
    tooltip: Maximum elevation for include polygon
  - style: edit
    position:
      x: 215
      y: 65
      width: 45
      height: 20
    text: Zmin
    variable: include_zmin
    tooltip: Minimum elevation for include polygon
- style: panel
  title: Exclude Polygons
  position:
    x: 390
    y: 10
    width: 270
    height: 120
  element:
  - style: listbox

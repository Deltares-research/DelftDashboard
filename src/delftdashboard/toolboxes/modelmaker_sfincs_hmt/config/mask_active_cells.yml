    position:
      x: 100
      y: 65
      width: 80
      height: 20
    method: delete_exclude_polygon
    tooltip: Delete selected exclude polygon
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: nr_exclude_polygons
        operator: gt
        value: 0
  - style: pushbutton
    text: Load Polygon
    position:
      x: 100
      y: 40
      width: 80
      height: 20
    method: load_exclude_polygon
    tooltip: Load exclude polygon from file
  - style: pushbutton
    text: Save Polygon
    position:
      x: 100
      y: 15
      width: 80
      height: 20
    method: save_exclude_polygon
    tooltip: Save exclude polygon to file
    dependency:
    - action: enable
      checkfor: all
      check:

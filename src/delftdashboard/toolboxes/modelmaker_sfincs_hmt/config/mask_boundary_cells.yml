element:
- style: panel
  title: Open Boundary Polygons
  position:
    x: 10
    y: 10
    width: 145
    height: 120
  element:
  - style: listbox
    position:
      x: 10
      y: 10
      width: 20
      height: 100
    method: select_open_boundary_polygon
    variable: open_boundary_polygon_index
    select: index
    option_string:
      variable: open_boundary_polygon_names
    tooltip: Select open boundary polygon from list
  - style: pushbutton
    text: Draw
    position:
      x: 40
      y: 90
      width: 40
      height: 20
    method: draw_open_boundary_polygon
    tooltip: Draw open boundary polygon on the map
  - style: pushbutton
    text: Delete
    position:
      x: 40
      y: 65
      width: 40
      height: 20
    method: delete_open_boundary_polygon
    tooltip: Delete selected open boundary polygon
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: nr_open_boundary_polygons
        operator: gt
        value: 0
  - style: pushbutton
    text: Load
    position:
      x: 40
      y: 40
      width: 40
      height: 20
    method: load_open_boundary_polygon
    tooltip: Load open boundary polygon from file
  - style: pushbutton
    text: Save
    position:
      x: 40
      y: 15
      width: 40
      height: 20
    method: save_open_boundary_polygon
    tooltip: Save open boundary polygon to file
    dependency:
    - action: enable
      checkfor: all
      check:
      - variable: nr_open_boundary_polygons
        operator: gt
        value: 0
  - style: edit
    position:
      x: 90
      y: 65
      width: 45
      height: 20
    text: Zmax
    text_position: above-left
    variable: open_boundary_zmax
    tooltip: Maximum elevation for open boundary
  - style: edit
    position:
      x: 90
      y: 15
      width: 45
      height: 20
    text: Zmin
    text_position: above-left
    variable: open_boundary_zmin
    tooltip: Minimum elevation for open boundary

element:
- style: listbox
  position:
    x: 10
    y: 10
    width: 100
    height: 110
  text: Polylines
  textposition: above
  method: select_polyline
  variable: active_polyline
  tooltip: Select polyline from list
  select: index
  option_string:
    variable: polyline_names
- style: pushbutton
  text: Add Polyline
  position:
    x: 120
    y: 100
    width: 120
    height: 20
  method: draw_polyline
  tooltip: Draw new polyline
- style: pushbutton
  text: Delete Polyline
  position:
    x: 120
    y: 75
    width: 120
    height: 20
  method: delete_polyline
  tooltip: Delete selected polyline
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0 
- style: pushbutton
  text: Load Polyline
  position:
    x: 120
    y: 50
    width: 120
    height: 20
  method: load_polyline
  tooltip: Load polylines from geojson file
- style: pushbutton
  text: Save Polyline
  position:
    x: 120
    y: 25
    width: 120
    height: 20
  method: save_polyline
  tooltip: Save polyline(s) to geojson file
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0 
- style: pushbutton
  text: Apply Buffer
  position:
    x: 250
    y: 100
    width: 120
    height: 20
  method: apply_buffer
  tooltip: Create polygon by applying buffer to polyline(s). The polygon will appear under the "Polygon" tab.
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0 
- style: edit
  position:
    x: 380
    y: 100
    width: 50
    height: 20
  variable: polyline_buffer_distance
  method: edit_polyline_buffer_distance
  text: Distance (m)  
  text_position: right
  tooltip: Edit buffer distance in metres
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0
- style: pushbutton
  text: Apply Asymmetric Buffer
  position:
    x: 250
    y: 75
    width: 120
    height: 20
  method: apply_asym_buffer
  tooltip: Create polygon by applying asymmetric buffer to polyline(s). The polygon will appear under the "Polygon" tab.
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0 
- style: edit
  position:
    x: 380
    y: 75
    width: 50
    height: 20
  variable: polyline_buffer_distance_left
  method: edit_polyline_buffer_distance_left
  text: Distance left (m)  
  text_position: right
  tooltip: Edit asymmetric buffer distance (left) in metres
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0
- style: edit
  position:
    x: 520
    y: 75
    width: 50
    height: 20
  variable: polyline_buffer_distance_right
  method: edit_polyline_buffer_distance_right
  text: Distance right (m)  
  text_position: right
  tooltip: Edit asymmetric buffer distance (right) in metres
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0
- style: pushbutton
  text: Apply Parallel Offset
  position:
    x: 250
    y: 50
    width: 120
    height: 20
  method: apply_parallel_offset
  tooltip: Create polyline by applying parallel offset to polyline(s).
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0 
- style: edit
  position:
    x: 380
    y: 50
    width: 50
    height: 20
  variable: polyline_parallel_offset_distance
  method: edit_polyline_parallel_offset_distance
  text: Distance (m)  
  text_position: right
  tooltip: Edit parallel offset distance in metres. Negative values will offset to the left, positive values to the right.
  dependency:
  - action: enable
    checkfor: all
    check:
    - variable: nr_polylines
      operator: gt
      value: 0

element:
- style: tabpanel
  id: modelmaker_hurrywave_hmt
  position:
    x: 10
    y: 10
    width: -10
    height: 160
  tab:
  - string: Domain
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.domain
    element: domain.yml
  - string: Quadtree
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.quadtree
    element: quadtree.yml
  - string: Bathymetry
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.bathymetry
    element: bathymetry.yml
  - string: Mask Active Cells
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.mask_active_cells
    element: mask_active_cells.yml
  - string: Mask Boundary Cells
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.mask_boundary_cells
    element: mask_boundary_cells.yml
  - string: Wave Blocking
    module: delftdashboard.toolboxes.modelmaker_hurrywave_hmt.waveblocking
    element: waveblocking.yml
    dependency:
    - action: visible
      checkfor: all
      check:
      - variable: use_waveblocking
        operator: eq
        value: true

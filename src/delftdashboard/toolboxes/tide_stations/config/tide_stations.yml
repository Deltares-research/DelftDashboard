element:
- style: panel
  position:
    x: 10
    y: 10
    width: -10
    height: 160
  element:
  - style: listbox
    position:
      x: 10
      y: 60
      width: 100
      height: 80
    text: Dataset
    text_position: above
    method: select_dataset
    variable: dataset_name
    select: item
    option_string:
      variable: dataset_long_names
    option_value:
      variable: dataset_names
    tooltip: Select the tidal dataset to use
  - style: radiobuttongroup
    position:
      x: 10
      y: 10
      width: 100
    variable: naming_option
    option_string: ["Name", "ID"]
    option_value: ["name", "id"]
    method: select_naming_option
    tooltip: Select whether to use station name or ID for labelling
  - style: listbox
    position:
      x: 120
      y: 40
      width: 200
      height: 100
    text: Stations
    text_position: above
    method: select_station
    variable: active_station_index
    select: index
    option_string:
      variable: station_names
    tooltip: Select a tide station from the list
  - style: pushbutton
    position:
      x: 120
      y: 10
      width: 95
      height: 20
    text: Draw Polygon
    method: draw_polygon
    enable: true
    tooltip: Draw a polygon to filter stations by area
  - style: pushbutton
    position:
      x: 225
      y: 10
      width: 95
      height: 20
    text: Delete Polygon
    method: delete_polygon
    enable: true
    tooltip: Delete the filter polygon
  - style: pushbutton
    position:
      x: 330
      y: 120
      width: 100
      height: 20
    text: Add to Model
    method: add_stations_to_model
    tooltip: Add selected stations as observation points to the active model
  - style: pushbutton
    position:
      x: 330
      y: 95
      width: 100
      height: 20
    text: View Tide Signal
    method: view_tide_signal
    enable: true
    tooltip: View the predicted tidal signal for the selected station
  - style: pushbutton
    position:
      x: 330
      y: 70
      width: 100
      height: 20
    text: Export Tide Signal
    method: export_tide_signal
    tooltip: Export the tidal signal to file
  - style: pushbutton
    position:
      x: 330
      y: 45
      width: 100
      height: 20
    text: Export Components
    method: export_tidal_components
    enable: false
    tooltip: Export tidal components to file
  - style: checkbox
    position:
      x: 330
      y: 20
      width: 100
      height: 20
    text: Main Components
    variable: main_components
    tooltip: Check to only show main tidal components
  - style: datetimeedit
    position:
      x: 500
      y: 120
      width: 120
      height: 20
    text: Start Time
    variable: tstart
    tooltip: Set the start date and time for tidal prediction
  - style: datetimeedit
    position:
      x: 500
      y: 95
      width: 120
      height: 20
    text: End Time
    variable: tend
    tooltip: Set the end date and time for tidal prediction
  - style: edit
    position:
      x: 500
      y: 70
      width: 120
      height: 20
    text: Time Step (s)
    variable: dt
    tooltip: Edit time step in seconds for tidal prediction
  - style: edit
    position:
      x: 500
      y: 45
      width: 120
      height: 20
    text: Offset (m)
    variable: offset
    tooltip: Edit water level offset in metres
  - style: popupmenu
    position:
      x: 500
      y: 20
      width: 50
      height: 20
    text: Format
    variable: format
    select: item
    tooltip: Select the export file format
    option_string:
      variable: format_text
    option_value:
      variable: format_value    
  - style: tableview
    position:
      x: 650
      y: 10
      width: 250
      height: 130
    tooltip: Astronomical Components
    selection_type: singles
    sortable: true
    option_value:
      variable: constituent_table

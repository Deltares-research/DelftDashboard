element:
- style: edit
  position:
    x: 40
    y: 110
    width: 80
    height: 20
  text: Name
  variable: active_model_name
  tooltip: Edit the domain name
- style: edit
  position:
    x: 40
    y: 60
    width: 80
    height: 20
  text: EPSG
  variable: active_model_crs
  tooltip: Edit the coordinate reference system EPSG code
- style: edit
  position:
    x: 40
    y: 85
    width: 80
    height: 20
  text: Type
  variable: active_model_type
  tooltip: Edit the model type

- style: edit
  position:
    x: 180
    y: 60
    width: 80
    height: 20
  text: Spinup time
  variable: flow_spinup_time
  tooltip: Edit the flow model spin-up time

- style: edit
  position:
    x: 180
    y: 85
    width: 80
    height: 20
  text: Station
  variable: station
  tooltip: Edit the station name

- style: edit
  position:
    x: 180
    y: 110
    width: 80
    height: 20
  text: Flow nested
  variable: flow_nested
  tooltip: Edit the flow nesting relationship

- style: checkbox
  position:
    x: 280
    y: 60
    width: 120
    height: 20
  text: Flood map
  variable: make_flood_map
  tooltip: Enable flood map generation for this domain
  variable_group: model_database

- style: checkbox
  position:
    x: 280
    y: 85
    width: 120
    height: 20
  text: Water level map
  variable: make_water_level_map
  tooltip: Enable water level map generation for this domain
  variable_group: model_database

- style: checkbox
  position:
    x: 280
    y: 110
    width: 120
    height: 20
  text: Precipitation map
  variable: make_precipitation_map
  tooltip: Enable precipitation map generation for this domain
  variable_group: model_database


- style: popupmenu
  position:
    x: 390
    y: 90
    width: 150
    height: 20
  text: Choose collection
  text_position: above
  tooltip: Select the collection to add the model to
  method: set_collection_toml
  module: delftdashboard.toolboxes.model_database.add_model
  variable: selected_collection_toml
  variable_group: model_database
  select: item
  option_value:
    variable: available_collection_names 
    variable_group: model_database

- style: pushbutton
  position:
    x: 550
    y: 110
    width: 100
    height: 20
  method: write_toml_file
  text: Write model.toml
  tooltip: Write the model configuration to a TOML file